services:
  mysql:
    image: mysql:8.0
    container_name: size-compare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: size_compare
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: size-compare-backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql
    ports:
      - "8000:8000"
    depends_on:
      - mysql

volumes:
  mysql-data: